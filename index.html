<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch - Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ SkyFetch</h1>
        <p class="tagline">Your Personal Weather Dashboard</p>

        <div id="recent-searches-section" class="recent-searches-section">
    
    <h3 class="recent-title">Recent Searches</h3>

    <div id="recent-searches-container" class="recent-container">
        <!-- Buttons will be added here dynamically -->
    </div>

    </div>
        
        <div class="search-section">
    <input 
        type="text" 
        id="city-input" 
        placeholder="Enter city name..."
    >
    
    <button id="search-btn">🔍 Search</button>
    </div>
        <div id="weather-display">
            <div class="welcome-message">
                <h2>🌤️ Weather Dashboard</h2>
                <p>Enter a city name above to check the current weather.</p>
            </div>
        </div>
    </div>

    <div id="recent-searches-section" class="recent-searches-section">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h4>Recent Searches</h4>
        <button id="clear-history-btn" class="clear-history-btn">Clear</button>
    </div>
        <div id="recent-searches-container"></div>
    </div>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Your JS -->
    <script src="app.js"></script>
</body>
</html>
